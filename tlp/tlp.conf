# ----------------------------------------------------------------------------
# /etc/tlp.conf - Configurações do TLP do usuário (versão 1.9.1)
# Manual completo (se quiser nerdar muito): https://linrunner.de/tlp/settings
#
# Copyright (c) 2025 Thomas Koch <linrunner at gmx.net> e galera.
# SPDX-License-Identifier: GPL-2.0-or-later
#
# O sistema lê as configurações nesta ordem (quem lê por último, manda):
#
# 1. Padrões de fábrica (que já vêm embutidos no TLP)
# 2. /etc/tlp.d/*.conf - Arquivos de configuração extras perdidos por aí
# 3. /etc/tlp.conf     - O SEU arquivo (este aqui, o chefão)
#
# PERFIS DE ENERGIA: o TLP divide a vida do seu notebook em perfis:
# - AC (Tomada / Performance): Entra em ação quando o PC tá plugado na tomada.
# - BAT (Bateria / Balanced): Entra em ação quando você puxa o cabo e vai pra bateria.
# - SAV (Power-saver): Modo economia máxima (ativado manualmente). Se não tiver
#   regra pra ele, ele copia as regras do modo BAT.
#
# Regras do jogo pra editar isso aqui:
# - Tudo que tem o '#' na frente está DESATIVADO (o TLP vai usar o padrão dele).
# - Pra ativar e mudar alguma coisa, APAGUE o '#' da frente da linha.
# - Se for mexer numa configuração que tem AC, BAT e SAV, preencha todas! Se esquecer
#   uma, o TLP vai copiar do outro perfil e vai virar bagunça.
# - Pra desligar totalmente um recurso, deixe vazio: PARAMETRO=""
# ----------------------------------------------------------------------------

# Ligar ou desligar o TLP geral (0 = desliga, 1 = liga)
#TLP_ENABLE=1

# Modo "Faça Você Mesmo". Se botar 1 aqui, o TLP não vai fazer NENHUMA 
# otimização padrão. Ele só vai aplicar o que você explicitamente tirar o '#' 
# nesse arquivo. (Bom pra quem quer controlar detalhe por detalhe).
#TLP_DISABLE_DEFAULTS=1

# O quão fofoqueiro o TLP deve ser com os erros:
#   0=calado
#   1=salva nos logs do sistema
#   2=joga na sua cara no terminal
#   3=faz os dois (padrão)
#TLP_WARN_LEVEL=3

# Corzinha pra deixar as mensagens bonitas no terminal (padrão ANSI).
# A ordem é: <erro> <aviso> <nota> <sucesso>.
#TLP_MSG_COLORS="91 93 1 92"

# Como o TLP deve trocar de perfil quando você espeta/tira o cabo:
#   0=nunca troca sozinho
#   1=troca sempre (tomada = performance / fora da tomada = bateria)
#   2=modo inteligente (não mexe se você ativou economia máxima na mão)
#TLP_AUTO_SWITCH=2

# Qual modo usar se o esquema automático acima estiver desligado:
# PRF (Performance), BAL (Balanceado), SAV (Economia de energia)
#TLP_DEFAULT_MODE=BAL

# Travar o perfil pra sempre na opção que você escolheu ali em cima? 
# (0 = não, 1 = sim)
#TLP_PERSISTENT_DEFAULT=0

# Ignorar alguma fonte de energia (AC, USB, BAT). 
# Útil se o seu hardware for doido e achar que tá na bateria quando tá na tomada.
#TLP_PS_IGNORE="BAT"

# ----------------------------------------------------------------------------
# DISCOS (HDs e SSDs)
# ----------------------------------------------------------------------------

# Tempo (em segundos) que o TLP espera o disco ficar sem fazer nada antes de 
# sincronizar os dados. 0 desliga.
#DISK_IDLE_SECS_ON_AC=0
#DISK_IDLE_SECS_ON_BAT=2

# Tempo de "página suja" na RAM (em segundos). Quanto tempo os dados ficam 
# na RAM antes de serem gravados fisicamente no disco.
#MAX_LOST_WORK_SECS_ON_AC=15
#MAX_LOST_WORK_SECS_ON_BAT=60

# ----------------------------------------------------------------------------
# PROCESSADOR (CPU)
# ----------------------------------------------------------------------------

# Modo de operação do driver da CPU (intel_pstate ou amd-pstate pra Ryzen).
# Opções: active, passive, guided.
#CPU_DRIVER_OPMODE_ON_AC=active
#CPU_DRIVER_OPMODE_ON_BAT=active
#CPU_DRIVER_OPMODE_ON_SAV=active

# O "Governador" da CPU. É quem decide a velocidade do processador.
# Na tomada costuma ser 'performance'. Na bateria, 'powersave' ou 'ondemand'.
# Dica: 'powersave' no Linux já é bem inteligente, não deixa a máquina uma carroça.
#CPU_SCALING_GOVERNOR_ON_AC=performance
#CPU_SCALING_GOVERNOR_ON_BAT=powersave
#CPU_SCALING_GOVERNOR_ON_SAV=powersave

# Limites mínimo e máximo de frequência da sua CPU.
# Use o comando 'tlp-stat -p' no terminal pra ver quais frequências sua CPU aceita.
#CPU_SCALING_MIN_FREQ_ON_AC=0
#CPU_SCALING_MAX_FREQ_ON_AC=0
#CPU_SCALING_MIN_FREQ_ON_BAT=0
#CPU_SCALING_MAX_FREQ_ON_BAT=0

# Política de energia da CPU (EPP). Do mais gastão pro mais econômico:
# performance, balance_performance, default, balance_power, power.
#CPU_ENERGY_PERF_POLICY_ON_AC=balance_performance
#CPU_ENERGY_PERF_POLICY_ON_BAT=balance_power
#CPU_ENERGY_PERF_POLICY_ON_SAV=power

# Limite brutal de desempenho da CPU em porcentagem (0 a 100%).
#CPU_MIN_PERF_ON_AC=0
#CPU_MAX_PERF_ON_AC=100
#CPU_MIN_PERF_ON_BAT=0
#CPU_MAX_PERF_ON_BAT=80

# Turbo Boost (Intel) ou Core Performance Boost (AMD):
# 0 = proíbe a CPU de usar o turbo, 1 = libera o turbo.
# Desligar isso na bateria faz ela durar HORRORES a mais, mas corta o pico de poder.
#CPU_BOOST_ON_AC=1
#CPU_BOOST_ON_BAT=1
#CPU_BOOST_ON_SAV=0

# Perfil geral do sistema (Ventoinhas, calor, energia):
# performance (frita e voa), balanced (meio termo), low-power (silencioso e lerdo).
#PLATFORM_PROFILE_ON_AC=performance
#PLATFORM_PROFILE_ON_BAT=balanced
#PLATFORM_PROFILE_ON_SAV=low-power

# Modo de suspensão quando você fecha a tampa:
# s2idle: Dorme levinho, acorda rápido (gasta um pouco mais).
# deep: Hiberna pesado na memória RAM (economiza mais, mas pode bugar em alguns PCs).
#MEM_SLEEP_ON_AC=s2idle
#MEM_SLEEP_ON_BAT=deep

# ----------------------------------------------------------------------------
# MAIS COISAS DE DISCO (Focado em HDDs antigos e SATA)
# ----------------------------------------------------------------------------

# Em quais discos o TLP vai mexer (separe com espaço). Ex: "nvme0n1 sda"
#DISK_DEVICES="nvme0n1 sda"

# Nível de economia de energia do HD (1 a 254). 
# 1 = desliga o disco toda hora, 254 = não desliga nunca. 255 = modo F#d*-se (máximo).
#DISK_APM_LEVEL_ON_AC="254 254"
#DISK_APM_LEVEL_ON_BAT="128 128"

# Desligar HDDs mecânicos após muito tempo sem uso (0 desliga o recurso).
#DISK_SPINDOWN_TIMEOUT_ON_AC="0 0"
#DISK_SPINDOWN_TIMEOUT_ON_BAT="0 0"

# Gerenciamento de energia da porta SATA (ALPM). 
# med_power_with_dipm é o melhor meio termo.
#SATA_LINKPWR_ON_AC="med_power_with_dipm"
#SATA_LINKPWR_ON_BAT="med_power_with_dipm"

# ----------------------------------------------------------------------------
# PLACA DE VÍDEO (GPU)
# ----------------------------------------------------------------------------

# Frequências da placa de vídeo integrada Intel.
#INTEL_GPU_MIN_FREQ_ON_AC=0
#INTEL_GPU_MAX_FREQ_ON_BAT=0

# Gerenciamento de energia da placa AMD (Radeon/Vega). 
# auto, low, high. Deixa no 'auto' que a AMD se vira bem.
RADEON_DPM_PERF_LEVEL_ON_AC=auto
RADEON_DPM_PERF_LEVEL_ON_BAT=auto

# Nível de economia do brilho da tela nativo das placas AMD (0 a 4).
# 4 economiza muita bateria, mas as cores da tela podem ficar meio lavadas.
#AMDGPU_ABM_LEVEL_ON_AC=0
#AMDGPU_ABM_LEVEL_ON_BAT=1

# ----------------------------------------------------------------------------
# REDE, ÁUDIO E OUTROS PERIFÉRICOS
# ----------------------------------------------------------------------------

# Modo de economia de energia do Wi-Fi (off = desligado, on = ativado).
#WIFI_PWR_ON_AC=off
#WIFI_PWR_ON_BAT=on

# Desativar Wake-on-LAN (aquela bruxaria de ligar o PC pela rede). Y = Sim.
#WOL_DISABLE=Y

# Economia de energia da placa de som (desliga a placa de som se ficar X segundos calada).
#SOUND_POWER_SAVE_ON_AC=1
#SOUND_POWER_SAVE_ON_BAT=1

# Gerenciamento de energia do barramento PCIe (Placa de vídeo, Wi-Fi, NVMe).
# default = Deixa a BIOS decidir (recomendado).
#PCIE_ASPM_ON_AC=default

# Autosuspend do USB. Desliga portas USB que não estão sendo usadas.
# (Teclados e mouses não são afetados, não se preocupe).
#USB_AUTOSUSPEND=1

# Lista negra do USB: IDs de aparelhos USB que não podem ser desligados de jeito nenhum.
# Use o comando 'lsusb' pra achar o ID do seu aparelho.
#USB_DENYLIST="1111:2222 3333:4444"

# Salvar o estado do Wi-Fi/Bluetooth quando desligar o PC, pra voltar igual quando ligar.
#RESTORE_DEVICE_STATE_ON_STARTUP=0

# Coisas pra ligar/desligar automaticamente quando o PC der boot.
#DEVICES_TO_DISABLE_ON_STARTUP="bluetooth nfc wifi wwan"
#DEVICES_TO_ENABLE_ON_STARTUP="wifi"

# ----------------------------------------------------------------------------
# BATERIA - LIMITES DE CARGA (A MÁGICA DOS THINKPADS ACONTECE AQUI!)
# ----------------------------------------------------------------------------
# O carregamento só começa quando a bateria cair ABAIXO do limite 'START'.
# O carregamento é cortado na raiz quando chegar no limite 'STOP'.
# Hardware necessário: Lenovo ThinkPads (o seu aguenta de boa).

# BAT0: Sua Bateria Principal
# Abaixo de qual porcentagem ele deve ligar o carregador:
START_CHARGE_THRESH_BAT0=75
# Em qual porcentagem ele deve parar de carregar e proteger a bateria:
STOP_CHARGE_THRESH_BAT0=80

# BAT1: Bateria Secundária (Alguns ThinkPads antigos tinham duas baterias)
#START_CHARGE_THRESH_BAT1=75
#STOP_CHARGE_THRESH_BAT1=80

# Restaurar os limites originais quando tirar da tomada (0 = não, 1 = sim).
#RESTORE_THRESHOLDS_ON_BAT=1

# ----------------------------------------------------------------------------
# WIZARD DE RÁDIO (Regras pra ligar/desligar Wi-Fi e Bluetooth sozinhos)
# ----------------------------------------------------------------------------

# Desligar Wi-Fi se eu plugar o cabo de rede (LAN)?
#DEVICES_TO_DISABLE_ON_LAN_CONNECT="wifi wwan"

# Ligar o Wi-Fi se eu arrancar o cabo de rede?
#DEVICES_TO_ENABLE_ON_LAN_DISCONNECT="wifi wwan"
